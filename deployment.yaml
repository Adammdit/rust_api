apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rust-api
  template:
    metadata:
      labels:
        app: rust-api
    spec:
      containers:
        - name: rust-api
          image: adammdit/rust-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rust-api
spec:
  type: LoadBalancer
  selector:
    app: rust-api
  ports:
    - port: 80
      targetPort: 8080
